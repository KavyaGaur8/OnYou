<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OnYou | Add Members</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/addMembersFilled.css">
</head>

<body>

<div class="mobile-app">

    <header class="header">

        <div class="logo">
            <span>&#8377;</span>OnYou
        </div>

        <div class="profile">
            &#128100;
        </div>

    </header>

    <section class="ribbon">

        <div class="triangle left-triangle"></div>

        <div class="page-title-box">
            Members
        </div>

        <div class="triangle right-triangle"></div>

    </section>

    <main class="content">

        <section class="greeting">
            <h2>Who is joining this bill?</h2>
        </section>

        <section class="menu">
            <button class="card">
                <span class="card-title">&#128247; Add From Contacts</span>
                <span class="right">&rsaquo;</span>
            </button>
        </section>

        <section class="members-section">
            <h3 class="section-title">Selected Members</h3>
            
            <div class="members-list-card">
                
                <div class="member-item">
                    <span class="member-name">Rahul</span>
                    <button class="remove-btn">&times;</button>
                </div>
                
                <div class="member-item">
                    <span class="member-name">Aman</span>
                    <button class="remove-btn">&times;</button>
                </div>
                
                <div class="member-item">
                    <span class="member-name">Priya</span>
                    <button class="remove-btn">&times;</button>
                </div>
                
                <button class="add-manual-btn">
                    <span>&#10133; Add Manually</span>
                </button>
                
            </div>
        </section>

        <footer class="footer-actions">
            <button class="continue-btn">
                Continue &rarr;
            </button>
        </footer>

    </main>

</div>

</body>

</html>
