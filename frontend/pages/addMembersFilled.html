<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OnYou | Members</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/common.css">

</head>

<body>

<div class="mobile-app">

    <!-- Header -->

    <header class="header">

        <div class="logo">
            <span>₹</span>OnYou
        </div>

        <div class="profile">
            👤
        </div>

    </header>

    <!-- Ribbon -->

    <section class="ribbon">

        <div class="triangle left-triangle"></div>

        <div class="page-title-box">
            Members
        </div>

        <div class="triangle right-triangle"></div>

    </section>

    <!-- Main -->

    <main class="content">

        <section class="greeting">

            <h2>Who is joining this bill?</h2>

        </section>

        <!-- Add Contacts -->

        <section class="menu">

            <button class="card">

                <span class="card-title">
                    📇 Add From Contacts
                </span>

                <span class="right">›</span>

            </button>

        </section>

        <!-- Members -->

        <section class="members-section">

            <h3 class="section-title">

                Selected Members (7)

            </h3>

            <div class="members-list-card">

                <div class="members-scroll">

                    <div class="member-item">
                        <span class="member-name">Rahul</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                    <div class="member-item">
                        <span class="member-name">Aman</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                    <div class="member-item">
                        <span class="member-name">Priya</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                    <div class="member-item">
                        <span class="member-name">Neha</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                    <div class="member-item">
                        <span class="member-name">Karan</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                    <div class="member-item">
                        <span class="member-name">Rohan</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                    <div class="member-item">
                        <span class="member-name">Vivek</span>
                        <button class="remove-btn">&times;</button>
                    </div>

                </div>

                <button class="add-manual-btn">

                    ➕ Add Manually

                </button>

            </div>

        </section>

        <!-- Continue -->

        <footer class="footer-actions">

            <button class="continue-btn">

                Continue →

            </button>

        </footer>

    </main>

</div>

</body>

</html>
