<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OnYou | Billing</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/common.css">

</head>

<body>

<div class="mobile-app">

    <!-- Header -->

    <header class="header">

        <div class="logo">
            <span>&#8377;</span>OnYou
        </div>

        <div class="profile">
            &#128100;
        </div>

    </header>

    <!-- Ribbon -->

    <section class="ribbon">

        <div class="triangle left-triangle"></div>

        <div class="page-title-box">
            Billing
        </div>

        <div class="triangle right-triangle"></div>

    </section>

    <!-- Main -->

    <main class="content">

        <!-- Merchant -->

        <section class="merchant-section">

            <h2 class="page-heading">
                Merchant
            </h2>

            <div class="merchant-card">

                <h3>Cafe Coffee Day</h3>

                <p>cafecoffeeday@upi</p>

            </div>

        </section>


        <!-- Bill -->

        <section class="bill-section">

            <h2 class="page-heading">
                Total Bill
            </h2>

            <div class="bill-input">

                <span class="rupee">&#8377;</span>

                <input
                    type="number"
                    placeholder="0"
                    id="billAmount"
                >

            </div>

        </section>


        <!-- Summary -->

        <section class="summary-card">

            <div>

                <span>Assigned</span>

                <strong>₹1200</strong>

            </div>

            <div>

                <span>Remaining</span>

                <strong class="remaining">₹0</strong>

            </div>

        </section>


        <!-- Members -->

        <section class="members-section">

            <div class="members-header">

                <h2 class="page-heading">

                    Members (3)

                </h2>

                <button class="equal-btn">

                    Equal Split

                </button>

            </div>


            <div class="members-card">

                <div class="member-row">

                    <span>Rahul</span>

                    <input
                        type="number"
                        value="400"
                    >

                </div>


                <div class="member-row">

                    <span>Aman</span>

                    <input
                        type="number"
                        value="400"
                    >

                </div>


                <div class="member-row">

                    <span>Priya</span>

                    <input
                        type="number"
                        value="400"
                    >

                </div>

            </div>

        </section>


        <!-- Continue -->

        <footer class="footer-actions">

            <button class="continue-btn">

                Continue →

            </button>

        </footer>

    </main>

</div>

</body>

</html>
