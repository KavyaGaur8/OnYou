<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OnYou | Create Bill</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/createBill1.css">
</head>

<body>

<div class="mobile-app">

    <header class="header">

        <div class="logo">
            <span>₹</span>OnYou
        </div>

        <div class="profile">
            👤
        </div>

    </header>

    <section class="ribbon">

        <div class="triangle left-triangle"></div>

        <div class="page-title-box">
            Create Bill
        </div>

        <div class="triangle right-triangle"></div>

    </section>

    <main class="content">

        <section class="greeting">

            <h2>Who are you splitting with?</h2>

        </section>

        <section class="menu">

            <button class="card">
                <div class="card-body">
                    <span class="card-title">👥 Existing Groups</span><br>
                    <span class="card-subtext">Use one of your saved groups</span>
                </div>
                <span class="right">›</span>
            </button>

            <button class="card">
                <div class="card-body">
                    <span class="card-title">➕ Add Members</span><br>
                    <span class="card-subtext">Create a new bill</span>
                </div>
                <span class="right">›</span>
            </button>

        </section>

    </main>

</div>

</body>

</html>
