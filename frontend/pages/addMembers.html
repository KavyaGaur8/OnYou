<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OnYou | Add Members</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/addMembers.css">
</head>

<body>

<div class="mobile-app">

    <!-- Header -->

    <header class="header">

        <div class="logo">
            <span>&#8377;</span>OnYou
        </div>

        <div class="profile">
            &#128100;
        </div>

    </header>

    <!-- Ribbon -->

    <section class="ribbon">

        <div class="triangle left-triangle"></div>

        <div class="page-title-box">
            Members
        </div>

        <div class="triangle right-triangle"></div>

    </section>

    <!-- Main Content -->

    <main class="content">

        <section class="greeting">

            <h2>Who is joining this bill?</h2>

        </section>

        <!-- Add Contacts -->

        <section class="menu">

            <button class="card">

                <span class="card-title">
                    📇 Add From Contacts
                </span>

                <span class="right">&rsaquo;</span>

            </button>

        </section>

        <!-- Selected Members -->

        <section class="members-section">

            <h3 class="section-title">
                Selected Members (0)
            </h3>

            <div class="members-list-card">

                <div class="empty-state">

                    <p>No members added yet.</p>

                </div>

                <button class="add-manual-btn">

                    <span>➕ Add Manually</span>

                </button>

            </div>

        </section>

        <!-- Continue -->

        <footer class="footer-actions">

            <button class="continue-btn" disabled>

                Continue →

            </button>

        </footer>

    </main>

</div>

</body>

</html>
